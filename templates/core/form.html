{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block crumb %}{{ title }}{% endblock %}
{% block content %}
<div class="page-heading"><h1>{{ title }}</h1></div>
<form method="post" class="form-panel">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="actions"><button class="button primary" type="submit">Сохранить</button><a class="button" href="javascript:history.back()">Отмена</a></div>
</form>
{% endblock %}
