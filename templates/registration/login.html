{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block public_content %}
<section class="login-panel">
    <p class="login-label">Информационная система</p>
    <h1>Охрана труда</h1>
    <p>Введите логин и пароль сотрудника.</p>
    {% if form.errors %}<div class="message error">Неверный логин или пароль.</div>{% endif %}
    <form method="post" class="form-stack">
        {% csrf_token %}
        <label for="id_username">Логин</label>
        {{ form.username }}
        <label for="id_password">Пароль</label>
        {{ form.password }}
        <button class="button primary" type="submit">Войти</button>
    </form>
</section>
{% endblock %}
